<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">  <!-- Define o conjunto de caracteres para a página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Responsividade para dispositivos móveis -->
    <title>Meu Perfil Aluno</title>  <!-- Título da página -->
    <link rel="stylesheet" href="perfil-aluno.css">  <!-- Link para o arquivo CSS de estilo -->
</head>
<body>
    <div class="container">  <!-- Contêiner principal da página -->
        <header>
            <h1>GYM CRUZEIRO</h1>  <!-- Título do cabeçalho -->
        </header>
        <main>
            <div class="profile">  <!-- Seção do perfil do usuário -->
                <div class="avatar">  <!-- Seção do avatar -->
                    <img src="IMG/AVATAR/feminino.jpg" alt="Foto">  <!-- Foto do aluno -->
                </div>
                <div class="info">  <!-- Seção de informações do perfil -->
                    <h2>Elisangela</h2>  <!-- Nome do usuário -->
                    <p>Feminino, 35 anos</p>  <!-- Informações adicionais (gênero e idade) -->
                </div>
            </div>
            <form>  <!-- Início do formulário para editar informações -->
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="name">Nome</label>  <!-- Rótulo para o campo de nome -->
                    <input type="text" id="name" name="name" value="Elisangela">  <!-- Campo de entrada para o nome -->
                    
                </div>
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="cpf">CPF</label>  <!-- Rótulo para o campo de CPF -->
                    <input type="text" id="cpf" name="cpf" value="***.***.***-***">  <!-- Campo de entrada para CPF -->
                    
                </div>
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="birthdate">Data de Nascimento</label>  <!-- Rótulo para o campo de data de nascimento -->
                    <input type="date" id="birthdate" name="birthdate" value="1990-01-01">  <!-- Campo de entrada para data -->

                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="gender">Gênero</label>  <!-- Rótulo para o campo de gênero -->
                    <input type="text" id="gender" name="gender" value="Feminino">  <!-- Campo de entrada para gênero -->
                </div>
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="email">E-mail</label>  <!-- Rótulo para o campo de e-mail -->
                    <input type="email" id="email" name="email" value="elisangela@example.com">  <!-- Campo de entrada para e-mail -->
                    <span class="edit-icon"></span>  <!-- Ícone de edição -->
                </div>
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="phone">Telefone</label>  <!-- Rótulo para o campo de telefone -->
                    <input type="tel" id="phone" name="phone" value="(11) 1234-5678">  <!-- Campo de entrada para telefone -->
                    <span class="edit-icon"></span>  <!-- Ícone de edição -->
                </div>
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="address">Endereço</label>  <!-- Rótulo para o campo de endereço -->
                    <input type="text" id="address" name="address" value="Rua exemplo, 280">  <!-- Campo de entrada para endereço -->
                    <span class="edit-icon"></span>  <!-- Ícone de edição -->
                </div>
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="height">Altura</label>  <!-- Rótulo para o campo de altura -->
                    <input type="text" id="height" name="height" value="1,70">  <!-- Campo de entrada para altura -->
                    <span class="edit-icon"></span>  <!-- Ícone de edição -->
                </div>   
                <div class="form-group">  <!-- Grupo de campos do formulário -->
                    <label for="weight">Peso</label>  <!-- Rótulo para o campo de peso -->
                    <input type="text" id="weight" name="weight" value="68">  <!-- Campo de entrada para peso -->
                    <span class="edit-icon"></span>  <!-- Ícone de edição -->
                </div>

                <button type="submit">Salvar</button>  <!-- Botão para enviar o formulário -->
            </form>
        </main>
    </div>
    <script src="script perfilaluno.js"></script>  <!-- Link para o arquivo JavaScript -->
</body>
</html>
