<!DOCTYPE html>  
<html lang="pt-BR">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Área Meu Histórico - Aluno</title>  
    <link rel="stylesheet" href="area-aluno.css">  <!-- Link para o arquivo CSS que estiliza a página -->
</head>  
<body>  
    <header>  
        <h1>GYM CRUZEIRO</h1>  <!-- Título principal da página -->
    </header>  
    <main>  
        <h2>MEU PERFIL</h2>  <!-- Subtítulo que indica a seção do perfil do aluno -->
        <table id="alunosTable">  <!-- Tabela para exibir informações dos alunos -->
            <thead>  
                <tr>  
                    <th>MEU PROFESSOR</th>  <!-- Cabeçalho da coluna para o nome do professor -->
                    <th>TREINO</th>  <!-- Cabeçalho da coluna para o tipo de treino -->
                    <th>OBJETIVO</th>  <!-- Cabeçalho da coluna para o objetivo do aluno -->
                    <th>PERÍODO</th>  <!-- Cabeçalho da coluna para o período do treino -->
                    <th>NOVA AVALIAÇÃO</th>  <!-- Cabeçalho da coluna para a nova avaliação -->
                </tr>  
            </thead>  
            <tbody>  
                <!-- As linhas da tabela serão populadas dinamicamente com JavaScript -->
            </tbody>  
        </table>  
    </main>  

    <!-- Botão de voltar no canto inferior direito -->
    <button class="btn-voltar" onclick="window.location.href='inicialaluno.html'">VOLTAR</button>

    <script src="script areaaluno.js"></script>  <!-- Script JavaScript que controla a lógica da página -->
</body>  
</html>
